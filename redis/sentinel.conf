# Redis Sentinel - monitors the primary and performs automatic failover.
# Template; each sentinel container copies this to a writable file before start.
port 26379
# Use hostnames (stable in Docker) rather than ephemeral container IPs.
sentinel resolve-hostnames yes
sentinel announce-hostnames yes
# Monitor primary "ratemaster" at redis-master:6379 with a quorum of 2 sentinels.
sentinel monitor ratemaster redis-master 6379 2
sentinel down-after-milliseconds ratemaster 5000
sentinel failover-timeout ratemaster 10000
sentinel parallel-syncs ratemaster 1
# For production (auth enabled on Redis):
# sentinel auth-pass ratemaster CHANGE_ME
