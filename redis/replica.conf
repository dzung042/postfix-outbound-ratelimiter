# Redis replica - read replica of redis-master (replicaof is passed on the CLI).
port 6379
maxmemory 1gb
maxmemory-policy volatile-ttl
appendonly yes
appendfsync everysec
save ""
replica-read-only yes
# Announce by hostname so Sentinel tracks stable names, not churning IPs.
# (replica-announce-ip is set per-container via the service name resolver.)
# For production also set:
# masterauth CHANGE_ME
# requirepass CHANGE_ME
