#---------------------------------------------------------------------
# HAProxy: single entry point in front of the stateless policyd replicas.
#  - TCP frontend :10032  -> Postfix policy protocol  (the HA-critical path)
#  - HTTP frontend :8080  -> admin UI + REST API
#  - :8404 stats
# Replicas are discovered via Docker's DNS resolver, so `--scale policyd=N`
# is picked up without editing this file (server-template provisions N slots).
#---------------------------------------------------------------------
global
    log stdout format raw local0
    maxconn 20000

defaults
    log     global
    mode    tcp
    option  dontlognull
    timeout connect 5s
    timeout client  60s
    timeout server  60s

resolvers docker
    nameserver dns 127.0.0.11:53
    resolve_retries 3
    timeout resolve 1s
    timeout retry   1s
    hold valid 5s

# --- Postfix policy protocol (TCP) ---
frontend policy_fe
    bind *:10032
    mode tcp
    option tcplog
    default_backend policy_be

backend policy_be
    mode tcp
    balance leastconn
    option tcp-check
    # Provision up to 6 replica slots from DNS; health-check the policy port.
    server-template pol 6 policyd:10032 check resolvers docker init-addr none

# --- Admin UI + API (HTTP) ---
frontend ui_fe
    bind *:8080
    mode http
    option httplog
    default_backend ui_be

backend ui_be
    mode http
    balance roundrobin
    option httpchk GET /healthz
    http-check connect port 9100
    server-template ui 6 policyd:8080 check resolvers docker init-addr none

# --- Stats ---
frontend stats
    bind *:8404
    mode http
    stats enable
    stats uri /
    stats refresh 10s
