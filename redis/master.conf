# Redis primary - rate-limit counters + suspend blocklist.
port 6379
# Counters carry TTLs; evict the nearest-to-expiry first if memory fills.
maxmemory 1gb
maxmemory-policy volatile-ttl
# Light durability so the suspend blocklist survives a restart. Counters are
# ephemeral by design, so AOF everysec is a fine cost/safety trade.
appendonly yes
appendfsync everysec
save ""
# Sentinel uses hostnames (stable in Docker) instead of churning container IPs.
replica-announce-ip redis-master
# Uncomment for production and set the same in replica/sentinel + the service:
# requirepass CHANGE_ME
# masterauth CHANGE_ME
